spring.application.name=profileMS

server.port=9100
spring.datasource.url=jdbc:mysql://localhost:3306/profiledb
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Distributed Tracing Configuration
spring.application.id=profileMS
spring.sleuth.tracing.export.zipkin.endpoint=http://localhost:9411/api/v2/spans
management.tracing.sampling.probability=1.0
spring.sleuth.sampler.probability=1.0

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.default-produces-media-type=application/json

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

DOCTOR_NOT_FOUND = Doctor not found
DOCTOR_ALREADY_EXISTS = Doctor with this ID already exists
PATIENT_NOT_FOUND = Patient not found
PATIENT_ALREADY_EXISTS = Patient with this ID already exists