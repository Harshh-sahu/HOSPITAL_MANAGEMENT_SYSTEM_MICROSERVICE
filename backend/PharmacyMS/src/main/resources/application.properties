spring.application.name=PharmacyMS


server.port=9300
spring.datasource.url=jdbc:mysql://localhost:3306/pharmacydb
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.default-produces-media-type=application/json

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

SALE_ITEM_NOT_FOUND= Sale item not found
MEDICINE_ALREADY_EXISTS= Medicine with the same name and dosage already exists
MEDICINE_NOT_FOUND= Medicine not found
SALE_ALREADY_EXISTS_FOR_PRESCRIPTION= Sale already exists for this prescription

OUT_OF_STOCK= medicine is out of stock
SALE_NOT_FOUND = sale record not found

SALE_ALREADY_EXISTS= Sale record already exists