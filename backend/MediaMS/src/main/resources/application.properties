spring.application.name=MediaMS

server.port=9400

# Eureka client registration (dev-local)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false
eureka.instance.non-secure-port=${server.port}
eureka.instance.instance-id=${spring.application.name}:${server.port}

spring.datasource.url=jdbc:mysql://localhost:3306/mediadb
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.default-produces-media-type=application/json

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

# Distributed Tracing - Sleuth and Zipkin Configuration
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.tracing.sampling.probability=1.0
management.tracing.brave.trace-id128=true
management.tracing.enabled=true

# Logging Configuration - Root Level (CRITICAL FOR LOGS TO APPEAR)
logging.level.root=INFO
logging.level.org.springframework.boot=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.cloud=INFO
logging.level.org.springframework.data=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Enhanced Logging Pattern with Trace Information
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%-5level] [%thread] [%-36.36logger{36}] [TraceId:%replace(%X{traceId}){'^$','-'}, SpanId:%replace(%X{spanId}){'^$','-'}] - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%-5level] [%thread] [%-36.36logger{36}] [TraceId:%replace(%X{traceId}){'^$','-'}, SpanId:%replace(%X{spanId}){'^$','-'}] - %msg%n

# File Logging Configuration
logging.file.name=logs/media.log
logging.file.max-size=10MB
logging.file.max-history=10
logging.file.total-size-cap=1GB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB