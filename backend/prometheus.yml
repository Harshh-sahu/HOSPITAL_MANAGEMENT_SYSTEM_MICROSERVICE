global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: gateway-ms
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:9000']

  - job_name: user-ms
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8080']

  - job_name: profile-ms
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:9100']

  - job_name: appointment-ms
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:9200']

  - job_name: pharmacy-ms
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:9300']

  - job_name: media-ms
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:9400']

  - job_name: eureka-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8761']