spring.application.name=AppointmentMS

server.port=9200
spring.datasource.url=jdbc:mysql://localhost:3306/appointmentdb
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Distributed Tracing Configuration
spring.application.id=AppointmentMS
spring.sleuth.tracing.export.zipkin.endpoint=http://localhost:9411/api/v2/spans
management.tracing.sampling.probability=1.0
spring.sleuth.sampler.probability=1.0

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.default-produces-media-type=application/json

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

APPOINTMENT_NOT_FOUND = Appointment not found
APPOINTMENT_ALREADY_CANCELLED= appointment already cancelled
DOCTOR_NOT_FOUND = Doctor not found
PATIENT_NOT_FOUND = Patient not found
APPOINTMENT_RECORD_NOT_FOUND= Appointment record not found